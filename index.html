<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Carta Interativa</title>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #fce4ec;
        font-family: Arial, sans-serif;
    }

    .envelope {
        width: 200px;
        height: 140px;
        background: #ff8a80;
        position: relative;
        cursor: pointer;
        transition: transform 0.3s;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .envelope:hover {
        transform: scale(1.1);
    }

    .envelope::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 70%;
        background: #ff5252;
        clip-path: polygon(0 0, 100% 0, 50% 100%);
        border-radius: 8px 8px 0 0;
    }

    .heart {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 32px;
        color: white;
    }
</style>
</head>

<body>

<a href="https://www.canva.com/design/DAHDL5BmBRw/ON4ycfBLHV3LVRnq9UHUjQ/view?utm_content=DAHDL5BmBRw&utm_campaign=designshare&utm_medium=link2&utm_source=uniquelinks&utlId=h5379cc2557" target="_blank">
    <div class="envelope">
        <div class="heart">T & M</div>
    </div>
</a>

</body>
</html>
